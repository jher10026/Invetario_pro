<!-- ===================================
     TEMPLATE RAÍZ - CON NOTIFICACIONES
     Archivo: src/app/app.html
     =================================== -->

<!-- Contenedor de notificaciones (siempre visible) -->
<app-notification-container></app-notification-container>

<!-- Layout principal -->
<div class="app-container">
  <!-- Sidebar solo si está autenticado -->
  <app-sidebar *ngIf="usuarioAutenticado$()"></app-sidebar>

  <!-- Contenido principal -->
  <main class="main-content" [class.authenticated]="usuarioAutenticado$()">
    <!-- Loading inicial -->
    <div *ngIf="cargandoAuth()" class="loading-screen">
      <div class="spinner"></div>
      <p>Cargando...</p>
    </div>

    <!-- Router Outlet -->
    <router-outlet *ngIf="!cargandoAuth()"></router-outlet>
  </main>
</div>

<!-- Toast legacy (puedes mantenerlo o quitarlo) -->
<app-toast></app-toast>
